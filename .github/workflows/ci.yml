name: quasar CI Pipeline 


on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version : '18'

      - name: install dependencies
        run: npm install 

      - name: Build Quasar app
        run: quasar build 