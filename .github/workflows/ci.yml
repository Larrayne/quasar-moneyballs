name: quasar CI Pipeline 

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: install dependencies
        run: npm install

      - name: Build Quasar app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quasar-build
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Debug secrets
        run: |
          echo "Site ID is set: ${NETLIFY_SITE_ID:+YES}"

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist/spa --auth $NETLIFY_AUTH_TOKEN --site $NETLIFY_SITE_ID --message "GitHub Actions Deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}